inherit_gem:
  rubocop-lts: config/rubygem_rspec.yml
inherit_from:
  - .rubocop_rspec.yml
plugins:
  - rubocop-on-rbs
  - rubocop-packaging
# This tells RuboCop to add the exclusions in this file
# to the default exclusions (and those from other inherited files),
# rather than overwriting them.
inherit_mode:
  merge:
    - Exclude

AllCops:
  Exclude:
    # the cache path in .gitlab-ci.yml is vendor/ruby
    # and it uses a gemfile in gemfiles/, so it is relative
    - "gemfiles/vendor/ruby/**/*"

# Metrics cops are disabled in Standard by default
Metrics:
  Enabled: true

Layout/LineLength:
  Max: 120

RSpec/NestedGroups:
  Enabled: false
RBS:
  Enabled: true
Layout/IndentationConsistency:
  Exclude: ['*.md']
